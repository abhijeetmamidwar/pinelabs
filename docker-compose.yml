version: '3.8'

services:
  db:
    container_name: pinelabs-db
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pinelabs
      POSTGRES_PASSWORD: pinelabs
      POSTGRES_DB: pinelabs
    ports:
      - "5435:5432"
    volumes:
      - pinelabs-postgres-data:/var/lib/postgresql/data

  web:
    container_name: pinelabs-web
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pinelabs:pinelabs@db:5432/pinelabs
      ENVIRONMENT: production
    depends_on:
      - db
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  pinelabs-postgres-data:
